# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: ['*']
  release:
    types: [published]

permissions:
  id-token: write
  contents: read
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  validate-version:
    name: Validate · Package version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate package versions
        id: version
        shell: bash
        run: |
          python3 scripts/validate-version.py
          VERSION="$(tr -d '[:space:]' < VERSION)"

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${GITHUB_REF_NAME#v}"

            if [ "$VERSION" != "$TAG" ]; then
              echo "Release tag '${GITHUB_REF_NAME}' must match VERSION '${VERSION}' or 'v${VERSION}'." >&2
              exit 1
            fi
          fi

          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

  # ── Package tests ──────────────────────────────────────────────────────────

  test-go:
    name: Test · Go package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod
          cache-dependency-path: packages/go/go.sum
      - name: Run tests
        run: go test ./...
        working-directory: packages/go

  test-python:
    name: Test · Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[grpc,dev]"
        working-directory: packages/python
      - name: Run tests
        run: pytest
        working-directory: packages/python

  test-dotnet-package:
    name: Test · .NET package
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        ports: ['5432:5432']
        env:
          POSTGRES_PASSWORD: pwd
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
      - name: Run tests
        run: dotnet test --configuration Release --logger "console;verbosity=normal"
        working-directory: packages/dotnet

  # ── Backend tests ──────────────────────────────────────────────────────────

  test-backend:
    name: Test · Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        ports: ['5432:5432']
        env:
          POSTGRES_PASSWORD: pwd
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.0.6-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ASPNETCORE_ENVIRONMENT: Testing
      ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=konfigo;Username=postgres;Password=pwd;Persist Security Info=True;"
      ConnectionStrings__Redis: "localhost:6379"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
      - name: Run tests
        run: dotnet test --configuration Release --logger "console;verbosity=normal"
        working-directory: apps/backend

  # ── Sample builds ─────────────────────────────────────────────────────────

  build-samples:
    name: Build · Samples (${{ matrix.sample }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sample: Go
          - sample: Python
          - sample: .NET
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        if: matrix.sample == 'Go'
        with:
          go-version-file: samples/go/go.mod
          cache-dependency-path: samples/go/go.sum
      - name: Build Go sample
        if: matrix.sample == 'Go'
        run: go build ./...
        working-directory: samples/go

      - uses: actions/setup-python@v5
        if: matrix.sample == 'Python'
        with:
          python-version: '3.12'
      - name: Install Python sample dependencies
        if: matrix.sample == 'Python'
        run: pip install -r requirements.txt
        working-directory: samples/python
      - name: Compile Python sample
        if: matrix.sample == 'Python'
        run: python -m compileall app.py
        working-directory: samples/python

      - uses: actions/setup-dotnet@v4
        if: matrix.sample == '.NET'
      - name: Restore .NET sample
        if: matrix.sample == '.NET'
        run: dotnet restore
        working-directory: samples/dotnet
      - name: Build .NET sample
        if: matrix.sample == '.NET'
        run: dotnet build --configuration Release --no-restore
        working-directory: samples/dotnet

  # ── Publish packages ───────────────────────────────────────────────────────

  publish-go:
    name: Publish · Go package
    if: github.event_name == 'release'
    needs: [validate-version, test-go, test-python, test-dotnet-package, test-backend, build-samples]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod
      - name: Trigger proxy indexing
        env:
          MODULE: github.com/maximiliysiss/konfigo/packages/go
          VERSION: ${{ github.event.release.tag_name }}
        run: curl -sf "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" || true

  publish-python:
    name: Publish · Python package
    if: github.event_name == 'release'
    needs: [validate-version, test-go, test-python, test-dotnet-package, test-backend, build-samples]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tool
        run: pip install hatch
      - name: Build distribution
        run: hatch build
        working-directory: packages/python
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/

  publish-dotnet-package:
    name: Publish · .NET package
    if: github.event_name == 'release'
    needs: [validate-version, test-go, test-python, test-dotnet-package, test-backend, build-samples]
    runs-on: ubuntu-latest
    env:
      NuGetDirectory: ${{ github.workspace }}/nuget
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
      - name: Pack
        run: dotnet pack --configuration Release --output ${{ env.NuGetDirectory }}
        working-directory: packages/dotnet
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: maximiliysiss
      - name: Push to NuGet.org
        shell: pwsh
        run: |
          foreach ($file in (Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Include *.nupkg)) {
            dotnet nuget push $file --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

  # ── Docker images ──────────────────────────────────────────────────────────

  docker-backend:
    name: Docker · Backend
    if: github.event_name == 'release'
    needs: [validate-version, test-go, test-python, test-dotnet-package, test-backend, build-samples]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/konfigo-backend
            ghcr.io/${{ github.repository_owner }}/konfigo-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          build-args: |
            KONFIGO_VERSION=${{ needs.validate-version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.validate-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Update DockerHub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/konfigo-backend
          readme-filepath: apps/backend/README.md
          short-description: Konfigo backend API, gRPC stream, and SignalR service

  docker-frontend:
    name: Docker · Frontend
    if: github.event_name == 'release'
    needs: [validate-version, test-go, test-python, test-dotnet-package, test-backend, build-samples]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/konfigo-frontend
            ghcr.io/${{ github.repository_owner }}/konfigo-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: true
          build-args: |
            KONFIGO_VERSION=${{ needs.validate-version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.validate-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Update DockerHub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/konfigo-frontend
          readme-filepath: apps/frontend/README.md
          short-description: Konfigo SvelteKit web UI for configuration management
